# ============================================================
# Replay System – Pekko configuration
# ============================================================

pekko {
  loglevel = "INFO"
  loggers  = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  actor {
    # Default dispatcher — suitable for CPU-bound actor work
    default-dispatcher {
      type       = Dispatcher
      executor   = "fork-join-executor"
      fork-join-executor {
        parallelism-min    = 2
        parallelism-factor = 2.0
        parallelism-max    = 16
      }
    }

    # Dedicated dispatcher for blocking I/O (Iceberg reads, JDBC writes)
    io-dispatcher {
      type       = Dispatcher
      executor   = "thread-pool-executor"
      thread-pool-executor {
        fixed-pool-size = 16
      }
      throughput = 1
    }
  }

  http {
    server {
      idle-timeout            = 60s
      request-timeout         = 30s
      max-connections         = 1024
      bind-timeout            = 5s
      server-header           = "replay-system"
    }
  }
}

# ============================================================
# Application-specific settings (override via env vars or -D)
# ============================================================
replay {
  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    batch-size = 500
  }

  datalake {
    catalog-type  = "hadoop"              # hadoop | rest | glue
    catalog-type  = ${?ICEBERG_CATALOG_TYPE}
    warehouse-uri = "/tmp/iceberg-warehouse"
    warehouse-uri = ${?ICEBERG_WAREHOUSE_URI}
  }

  postgres {
    url      = "jdbc:postgresql://localhost:5432/replay"
    url      = ${?POSTGRES_URL}
    user     = "replay"
    user     = ${?POSTGRES_USER}
    password = "replay"
    password = ${?POSTGRES_PASSWORD}
  }

  replay {
    batch-size    = 500    # events per Iceberg scan batch
    ask-timeout   = 5s
  }
}
