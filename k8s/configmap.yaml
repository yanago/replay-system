apiVersion: v1
kind: ConfigMap
metadata:
  name: replay-config
  namespace: replay-system
  labels:
    app.kubernetes.io/part-of: replay-system
data:
  # API server
  HTTP_PORT: "8080"

  # PostgreSQL — hostname matches the postgres Service name
  POSTGRES_URL: "jdbc:postgresql://postgres:5432/replay"

  # Kafka — hostname matches the kafka Service name
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # Iceberg data lake — path inside the shared data PVC
  ICEBERG_WAREHOUSE_URI: "/data/iceberg-warehouse"

  # Optional downstream REST endpoint; omit to use the simulated client
  # DOWNSTREAM_URL: "http://downstream-service/events"
