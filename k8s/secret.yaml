# =============================================================================
# TEMPLATE — do NOT commit real credentials.
# The k8s-deploy.sh script generates the actual Secret from environment
# variables (POSTGRES_USER, POSTGRES_PASSWORD) using kubectl.
#
# To apply manually:
#   kubectl create secret generic replay-secret \
#     --namespace replay-system \
#     --from-literal=POSTGRES_USER=<your-user> \
#     --from-literal=POSTGRES_PASSWORD=<your-password>
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: replay-secret
  namespace: replay-system
  labels:
    app.kubernetes.io/part-of: replay-system
type: Opaque
stringData:
  POSTGRES_USER: "CHANGEME"
  POSTGRES_PASSWORD: "CHANGEME"
