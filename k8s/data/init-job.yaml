apiVersion: batch/v1
kind: Job
metadata:
  name: data-init
  namespace: replay-system
  labels:
    app.kubernetes.io/part-of: replay-system
    app.kubernetes.io/component: data-init
spec:
  # Re-run if the pod fails; idempotent because DataGenerator overwrites
  backoffLimit: 3
  # Clean up completed pods after 1 h
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: data-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: data-generator
          image: replay-system:latest
          imagePullPolicy: IfNotPresent
          # Override the ENTRYPOINT to run the DataGenerator tool class
          command:
            - java
            - -cp
            - /app/replay-system.jar
            - com.example.replay.tools.DataGenerator
            - /data/iceberg-warehouse/security_events
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "384Mi"
          volumeMounts:
            - name: iceberg-data
              mountPath: /data/iceberg-warehouse
      volumes:
        - name: iceberg-data
          persistentVolumeClaim:
            claimName: iceberg-data-pvc
